# PR gate: contributor masked JSONL under data/compression/contributions/ (B-track Moat).
name: Compression contributor PR validate

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths:
      - "data/compression/contributions/**"
      - "data/compression/examples/compression_contributor*.jsonl"
      - "scripts/validate_compression_contributor_jsonl_v1.py"
      - "scripts/check_compression_contributions_manifest_v1.py"
      - "tests/test_validate_compression_contributor_jsonl_v1.py"
      - "tests/test_check_compression_contributions_manifest_v1.py"
      - ".github/workflows/compression-contributor-pr-validate.yml"
  pull_request:
    paths:
      - "data/compression/contributions/**"
      - "data/compression/examples/compression_contributor*.jsonl"
      - "scripts/validate_compression_contributor_jsonl_v1.py"
      - "scripts/check_compression_contributions_manifest_v1.py"
      - "tests/test_validate_compression_contributor_jsonl_v1.py"
      - "tests/test_check_compression_contributions_manifest_v1.py"
      - ".github/workflows/compression-contributor-pr-validate.yml"

permissions:
  contents: read

concurrency:
  group: compression-contributor-pr-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: |
          if [ -f requirements-public-reproduce.txt ]; then
            pip install -q -r requirements-public-reproduce.txt
          else
            pip install -q 'pytest>=7.0' 'jsonschema>=4.0'
          fi
      - name: Pytest contributor validator + manifest check
        run: |
          python3 -m pytest \
            tests/test_validate_compression_contributor_jsonl_v1.py \
            tests/test_check_compression_contributions_manifest_v1.py \
            -q --tb=short
      - name: Manifest + reference deny-valve example
        run: |
          python3 scripts/check_compression_contributions_manifest_v1.py \
            --validate-reference
      - name: Validate changed contributions JSONL (PR)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          mapfile -t FILES < <(git diff --name-only "$BASE" "$HEAD" -- 'data/compression/contributions/*.jsonl' || true)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No contributions JSONL changed in PR; manifest/reference checks only."
            exit 0
          fi
          for f in "${FILES[@]}"; do
            echo "=== validate $f ==="
            python3 scripts/validate_compression_contributor_jsonl_v1.py \
              --jsonl "$f" --min-rows 10
          done
          python3 scripts/check_compression_contributions_manifest_v1.py --pr-strict
